<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirim WA Cepat</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 400px; margin: auto; }
    h2 { text-align: center; }
    textarea { width: 100%; height: 150px; padding: 12px; font-size: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
    input { width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
    button { width: 100%; padding: 15px; margin-top: 10px; font-size: 18px; background: #25D366; color: white; border: none; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>Kirim Pesan WhatsApp</h2>
  
  <label>Nomor Tujuan:</label>
  <input type="tel" id="nomor" placeholder="6285728389595" value="6285728389595">
  
  <label>Tulis Pesan:</label>
  <textarea id="pesan" placeholder="Tulis pesan di sini..."></textarea>
  
  <button onclick="kirimWA()">Kirim ke WhatsApp</button>

  <script>
    function kirimWA() {
      let nomor = document.getElementById('nomor').value.trim();
      const pesan = document.getElementById('pesan').value.trim();
      
      if(!nomor || !pesan){
        alert('Nomor dan pesan harus diisi');
        return;
      }
      
      // Hapus 0 di depan, ganti jadi 62
      if(nomor.startsWith('0')){
        nomor = '62' + nomor.substring(1);
      }
      
      // Hapus spasi, +, - di nomor
      nomor = nomor.replace(/[\s+-]/g, '');
      
      // Encode pesan biar enter & spasi aman
      const text = encodeURIComponent(pesan);
      
      // Buka WA
      window.open(`https://wa.me/${nomor}?text=${text}`, '_blank');
    }
  </script>
</body>
</html>
