<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manajemen Kesanggupan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center min-h-screen p-4 pb-12">

    <!-- HEADER -->
    <div class="w-full max-w-md bg-white p-4 rounded-xl shadow-sm flex justify-between items-center mb-5">
        <h1 class="text-sm font-bold text-gray-500 uppercase">Panel Admin</h1>
        <button onclick="sessionStorage.clear(); window.location.href='index.html'" class="text-xs bg-red-50 text-red-600 font-bold py-1.5 px-3 rounded-lg">LOGOUT</button>
    </div>

    <!-- PROGRAM KELOMPOK -->
    <div id="containerKelompokAdmin" class="w-full max-w-md space-y-3 mb-5">
        <div class="text-center text-sm text-gray-500 animate-pulse">Memuat data...</div>
    </div>

    <!-- TOMBOL AKSI -->
    <div class="w-full max-w-md grid grid-cols-2 gap-3 mb-6">
        <button onclick="document.getElementById('modalKesanggupan').classList.remove('hidden')" class="bg-slate-800 text-white font-bold py-2 rounded-xl text-xs">➕ PROGRAM</button>
        <button onclick="document.getElementById('modalAnggota').classList.remove('hidden')" class="bg-slate-800 text-white font-bold py-2 rounded-xl text-xs">➕ ANGGOTA</button>
    </div>

    <!-- BOX DAFTAR ANGGOTA -->
    <div id="boxDaftarAnggota" class="hidden w-full max-w-md bg-white rounded-2xl shadow-lg p-5">
        <h3 id="namaProgramTerpilih" class="text-sm font-bold text-gray-800 uppercase mb-4"></h3>
        <div id="listAnggotaAdmin" class="space-y-4"></div>
    </div>

    <!-- MODALS & SCRIPT -->
    <div id="modalKesanggupan" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white p-5 rounded-xl w-full max-w-sm">
            <h4 class="font-bold mb-4">TAMBAH PROGRAM</h4>
            <input type="text" id="addId" placeholder="ID (KSPxxx)" class="w-full border p-2 mb-2 text-sm rounded">
            <input type="text" id="addNama" placeholder="Nama Program" class="w-full border p-2 mb-2 text-sm rounded">
            <input type="number" id="addTarget" placeholder="Target" class="w-full border p-2 mb-4 text-sm rounded">
            <div class="flex gap-2">
                <button onclick="submitData('tambah_kesanggupan', {id: document.getElementById('addId').value, nama: document.getElementById('addNama').value, target: document.getElementById('addTarget').value})" class="flex-1 bg-emerald-600 text-white py-2 rounded">SIMPAN</button>
                <button onclick="document.getElementById('modalKesanggupan').classList.add('hidden')" class="flex-1 bg-gray-300 py-2 rounded">BATAL</button>
            </div>
        </div>
    </div>

    <script>
        const URL = "URL_GOOGLE_APPS_SCRIPT_ANDA_DISINI";
        window.onload = () => { if(!sessionStorage.getItem("user_aktif")) window.location.href = "index.html"; loadKelompok(); };

        async function loadKelompok() {
            const res = await fetch(URL);
            const data = await res.json();
            const container = document.getElementById("containerKelompokAdmin");
            container.innerHTML = data.map(i => `
                <div onclick="showAnggota('${i.id_kesanggupan}', '${i.nama_kesanggupan}')" class="bg-white p-4 rounded-xl shadow border cursor-pointer">
                    <h4 class="font-bold">${i.nama_kesanggupan}</h4>
                    <p class="text-xs text-gray-500">Terkumpul: ${i.total_terkumpul} / Sisa: ${i.sisa_kekurangan}</p>
                </div>
            `).join('');
        }

        async function showAnggota(id, nama) {
            document.getElementById("boxDaftarAnggota").classList.remove("hidden");
            document.getElementById("namaProgramTerpilih").innerText = nama;
            const res = await fetch(`${URL}?action=get_semua_anggota_admin&id_kesanggupan=${id}`);
            const data = await res.json();
            document.getElementById("listAnggotaAdmin").innerHTML = data.map(a => `
                <div class="border-b pb-2">
                    <p class="font-bold text-sm">${a.nama}</p>
                    <p class="text-xs text-gray-500">Kesanggupan: ${a.kesanggupan_pribadi}</p>
                </div>
            `).join('');
        }

        async function submitData(act, body) {
            body.action = act;
            await fetch(URL, { method: "POST", body: JSON.stringify(body) });
            alert("Data tersimpan!"); location.reload();
        }
    </script>
</body>
</html>
