<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dzikra System</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>

<div class="app-container">
    <header>
        <h1>ADMIN PANEL</h1>
        <p id="admin-name" style="font-size: 0.8rem; color: var(--accent-color);"></p>
    </header>

    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="btn" style="padding: 10px; font-size: 0.8rem;" onclick="showModal('modal-kesanggupan')">+ KESANGGUPAN</button>
        <button class="btn" style="padding: 10px; font-size: 0.8rem;" onclick="showModal('modal-anggota')">+ ANGGOTA</button>
    </div>

    <div id="list-kesanggupan">
        <p class="status">Mengambil data sistem...</p>
    </div>

    <button class="btn btn-secondary" onclick="logout()" style="margin-top: 30px;">LOGOUT</button>
</div>

<div id="modal-kesanggupan" class="card" style="display:none; position: fixed; top: 10%; left: 5%; width: 90%; z-index: 100; background: #161b22;">
    <label>ID KESANGGUPAN (Contoh: TPP2026)</label>
    <input type="text" id="new-id-k">
    <label>NAMA KESANGGUPAN</label>
    <input type="text" id="new-nama-k">
    <label>TOTAL TARGET KELOMPOK</label>
    <input type="number" id="new-target-k">
    <button class="btn" onclick="simpanKesanggupan()">SIMPAN PROGRAM</button>
    <button class="btn btn-secondary" onclick="hideModal('modal-kesanggupan')" style="margin-top:10px">BATAL</button>
</div>

<div id="modal-anggota" class="card" style="display:none; position: fixed; top: 10%; left: 5%; width: 90%; z-index: 100; background: #161b22;">
    <label>NAMA ANGGOTA</label>
    <input type="text" id="new-nama-a">
    <label>NOMOR WA (Gunakan 62...)</label>
    <input type="number" id="new-wa-a">
    <label>PROGRAM KESANGGUPAN</label>
    <select id="select-k">
        </select>
    <label>TARGET PRIBADI (Rp)</label>
    <input type="number" id="new-target-a">
    <button class="btn" onclick="simpanAnggota()">DAFTARKAN ANGGOTA</button>
    <button class="btn btn-secondary" onclick="hideModal('modal-anggota')" style="margin-top:10px">BATAL</button>
</div>

<script>
    // Cek Login
    const userData = JSON.parse(sessionStorage.getItem("userData"));
    if (!sessionStorage.getItem("isLoggedIn") || userData.role !== 'admin') {
        window.location.href = "index.html";
    }
    document.getElementById("admin-name").innerText = "Log: " + userData.nama;

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz0fURtH8iIC2DiaxwBB9mfouo0V_EXs17kbg26AMzSzJFnvVk_dJ37tu2L73WS7gd9/exec";

    // Fungsi menampilkan modal
    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }

    // Fungsi Load Data List Kesanggupan
    function loadDashboard() {
        fetch(WEB_APP_URL + "?action=getDashboardAdmin")
        .then(res => res.json())
        .then(data => {
            let html = "";
            data.forEach(item => {
                html += `
                <div class="card" onclick="cekDetail('${item.id}', '${item.status}')">
                    <h3 style="text-align:center; color:var(--accent-color)">${item.nama}</h3>
                    <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin:10px 0;">
                        <span>Terkumpul: <b>Rp ${item.total}</b></span>
                        <span>Sisa: <b style="color:#ff4b2b">Rp ${item.sisa}</b></span>
                    </div>
                    <p style="text-align:center; font-size:0.7rem; border-top:1px solid var(--border-color); padding-top:10px">
                        STATUS: ${item.status.toUpperCase()}
                    </p>
                </div>`;
            });
            document.getElementById("list-kesanggupan").innerHTML = html;
        });
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = "index.html";
    }

    // Panggil saat halaman dibuka
    loadDashboard();
</script>

</body>
</html>
