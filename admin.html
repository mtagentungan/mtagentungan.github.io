<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Admin - Manajemen Kesanggupan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center min-h-screen p-4 space-y-6">

    <!-- HEADER ADMIN -->
    <div class="w-full max-w-md flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-200">
        <div>
            <h1 class="text-sm font-bold text-gray-500 uppercase tracking-wider">Panel Kontrol</h1>
            <p class="text-xs text-gray-400">Selamat Datang, Admin</p>
        </div>
        <button onclick="prosesLogout()" class="text-xs bg-red-50 hover:bg-red-100 text-red-600 font-bold py-1.5 px-3 rounded-lg border border-red-200 transition">
            LOGOUT
        </button>
    </div>

    <!-- SEKSYEN KARTU KESANGGUPAN GLOBAL (RATA TENGAH) -->
    <div class="w-full max-w-md text-center">
        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">Program Penggalangan Dana</h3>
        <div id="containerKelompokAdmin" class="space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-md border border-gray-200 animate-pulse text-gray-400 text-sm">
                Memuat data program kelompok...
            </div>
        </div>
    </div>

    <!-- NOTIFIER JIKA STATUS SELESAI DIKLIK -->
    <div id="popupNotifier" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl p-5 max-w-xs w-full text-center shadow-2xl border border-gray-100">
            <span class="text-3xl">🚫</span>
            <h4 class="text-md font-bold text-gray-800 mt-2">Program Telah Selesai</h4>
            <p class="text-xs text-gray-500 mt-1">Kesanggupan ini sudah dinyatakan selesai dan tidak dapat diubah lagi.</p>
            <button onclick="tutupNotifier()" class="mt-4 w-full bg-gray-800 text-white text-xs font-bold py-2 rounded-lg hover:bg-gray-900">Mengerti</button>
        </div>
    </div>

    <!-- DAFTAR ANGGOTA (MUNCUL JIKA PROGRAM AKTIF DIKLIK) -->
    <div id="boxDaftarAnggota" class="hidden w-full max-w-md bg-white rounded-2xl shadow-lg p-5 border border-gray-200">
        <div class="border-b border-gray-100 pb-3 mb-4">
            <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wider">Data Lengkap Anggota</h3>
            <p id="namaProgramTerpilih" class="text-xs text-emerald-600 font-medium mt-0.5"></p>
        </div>
        
        <!-- List Anggota Elegan ala CardView -->
        <div id="listAnggotaAdmin" class="space-y-3 max-h-80 overflow-y-auto pr-1">
            <!-- Data Terisi Otomatis -->
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzaScEjzHFGch0m83JKJaSSV64AeS-6ndmhmfFO9DFyQQ3rM9ePQw0Fy2-Vz6cillJh/exec";

        window.onload = function() {
            // Proteksi Halaman Admin
            const sessionData = sessionStorage.getItem("user_aktif");
            if (!sessionData) {
                window.location.href = "index.html";
                return;
            }
            const user = JSON.parse(sessionData);
            if (user.role.toLowerCase() !== "admin") {
                window.location.href = "anggota.html";
                return;
            }

            muatDataKelompokAdmin();
        };

        const Rupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(angka);

        // 1. Ambil data kesanggupan kelompok global
        async function muatDataKelompokAdmin() {
            const container = document.getElementById("containerKelompokAdmin");
            try {
                const response = await fetch(`${WEB_APP_URL}?action=get_kelompok`);
                const data = await response.json();

                if (data.length === 0) {
                    container.innerHTML = `<div class="bg-white p-4 rounded-xl shadow-md text-gray-500 text-xs">Belum ada program kesanggupan.</div>`;
                    return;
                }

                container.innerHTML = "";
                data.forEach(item => {
                    const warnaStatus = item.status.toLowerCase() === 'aktif' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800';
                    
                    // Membuat elemen card yang bisa diklik
                    const cardHTML = `
                        <div onclick="handleCardKlik('${item.id_kesanggupan}', '${item.nama_kesanggupan}', '${item.status}')" 
                             class="bg-white p-5 rounded-xl shadow-md border border-gray-200 flex flex-col items-center justify-center cursor-pointer hover:border-emerald-500 transition duration-200">
                            <span class="px-3 py-0.5 text-[10px] font-bold rounded-full ${warnaStatus} mb-2 uppercase">${item.status}</span>
                            <h4 class="text-md font-bold text-gray-800 mb-2">${item.nama_kesanggupan}</h4>
                            <div class="w-full space-y-1 text-xs border-t border-gray-100 pt-2 text-center">
                                <div><span class="text-gray-400">Total Terkumpul:</span> <span class="font-semibold text-emerald-600">${Rupiah(item.total_terkumpul)}</span></div>
                                <div><span class="text-gray-400">Sisa Kekurangan:</span> <span class="font-semibold text-red-500">${Rupiah(item.sisa_kekurangan)}</span></div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });
            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="bg-white p-4 rounded-xl shadow-md text-red-500 text-xs">Gagal memuat data keuangan.</div>`;
            }
        }

        // 2. Logika ketika Card Program diklik
        function handleCardKlik(idKsp, namaKsp, status) {
            if (status.toLowerCase() === 'selesai') {
                document.getElementById("popupNotifier").classList.remove("hidden");
                document.getElementById("boxDaftarAnggota").classList.add("hidden");
            } else {
                document.getElementById("popupNotifier").classList.add("hidden");
                document.getElementById("namaProgramTerpilih").innerText = namaKsp;
                document.getElementById("boxDaftarAnggota").classList.remove("hidden");
                
                // Panggil fungsi tiruan/sementara untuk memuat list anggota (akan dihubungkan ke database di langkah berikutnya)
                muatDaftarAnggotaPalsu();
            }
        }

        function tutupNotifier() {
            document.getElementById("popupNotifier").classList.add("hidden");
        }

        // Fungsi sementara sebelum ditarik dari database sesungguhnya di langkah 2
        function muatDaftarAnggotaPalsu() {
            const listContainer = document.getElementById("listAnggotaAdmin");
            listContainer.innerHTML = `
                <div class="p-3 bg-gray-50 rounded-xl border border-gray-100 text-xs text-gray-700 space-y-1 shadow-sm">
                    <div class="font-bold text-gray-800">WAWAN PRASETYO</div>
                    <div>📱 WA: 085725xxxxxx</div>
                    <div>💰 Kesanggupan: ${Rupiah(500000)}</div>
                    <div class="bg-white p-2 rounded-lg border border-gray-200 mt-2 text-[11px] text-gray-500 space-y-0.5">
                        <div>👤 Username: <span class="font-mono text-gray-800">maswe</span></div>
                        <div>🔑 PIN: <span class="font-mono text-gray-800">1234</span></div>
                    </div>
                </div>
            `;
        }

        function prosesLogout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
