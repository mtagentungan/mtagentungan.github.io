<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manajemen Kesanggupan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center min-h-screen p-4 pb-12 font-sans">

    <!-- HEADER -->
    <div class="w-full max-w-md bg-white p-4 rounded-xl shadow-sm flex justify-between items-center mb-5">
        <h1 class="text-sm font-bold text-gray-500 uppercase">Panel Admin</h1>
        <button onclick="sessionStorage.clear(); window.location.href='index.html'" class="text-xs bg-red-50 text-red-600 font-bold py-1.5 px-3 rounded-lg">LOGOUT</button>
    </div>

    <!-- PROGRAM KELOMPOK -->
    <div id="containerKelompokAdmin" class="w-full max-w-md space-y-3 mb-5"></div>

    <!-- BOX ANGGOTA -->
    <div id="boxDaftarAnggota" class="hidden w-full max-w-md bg-white rounded-2xl shadow-lg p-5">
        <h3 id="namaProgramTerpilih" class="text-sm font-bold text-gray-800 uppercase mb-4"></h3>
        <div id="listAnggotaAdmin" class="space-y-4"></div>
    </div>

    <!-- SCRIPT UTAMA -->
    <script>
        const URL = localStorage.getItem("APP_URL");

        window.onload = () => {
            if(!sessionStorage.getItem("user_aktif")) window.location.href = "index.html";
            loadKelompok();
        };

        const Rupiah = (a) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(a);

        // Load data program
        async function loadKelompok() {
            const res = await fetch(URL);
            const data = await res.json();
            document.getElementById("containerKelompokAdmin").innerHTML = data.map(i => `
                <div onclick="showAnggota('${i.id_kesanggupan}', '${i.nama_kesanggupan}')" class="bg-white p-4 rounded-xl shadow border cursor-pointer hover:border-emerald-500 transition">
                    <h4 class="font-bold text-sm">${i.nama_kesanggupan}</h4>
                    <p class="text-xs text-gray-500">Terkumpul: ${Rupiah(i.total_terkumpul)} | Sisa: ${Rupiah(i.sisa_kekurangan)}</p>
                </div>
            `).join('');
        }

        // Tampilkan anggota
        async function showAnggota(id, nama) {
            document.getElementById("boxDaftarAnggota").classList.remove("hidden");
            document.getElementById("namaProgramTerpilih").innerText = nama;
            const res = await fetch(`${URL}?action=get_semua_anggota_admin&id_kesanggupan=${id}`);
            const data = await res.json();
            document.getElementById("listAnggotaAdmin").innerHTML = data.map(a => `
                <div class="border-b pb-2 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-sm">${a.nama}</p>
                        <p class="text-xs text-gray-500">Kesanggupan: ${Rupiah(a.kesanggupan_pribadi)}</p>
                    </div>
                    <button onclick="nyicil('${a.id_anggota}', '${a.nama}')" class="bg-emerald-600 text-white text-[10px] font-bold px-3 py-1 rounded">💰 NYICIL</button>
                </div>
            `).join('');
        }

        // Aksi Nyicil
        async function nyicil(id, nama) {
            const nominal = prompt("Masukkan nominal angsuran untuk " + nama + ":");
            if (!nominal) return;
            await fetch(URL, { method: "POST", body: JSON.stringify({ action: "tambah_nyicil", id_anggota: id, nominal: nominal }) });
            alert("Berhasil!"); loadKelompok();
        }
    </script>
</body>
</html>
