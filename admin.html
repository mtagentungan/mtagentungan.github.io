<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <header><h1 id="nama-admin">ADMIN</h1></header>
    <div style="display:flex; gap:10px; margin-bottom:15px">
        <button class="btn" style="font-size:0.7rem" onclick="openM('modal-k')">+ KESANGGUPAN</button>
        <button class="btn" style="font-size:0.7rem" onclick="openM('modal-a')">+ ANGGOTA</button>
    </div>
    <div id="dash">Memuat data...</div>
    <button class="btn btn-secondary" onclick="location.href='index.html'">LOGOUT</button>
</div>

<div id="modal-k" class="card modal">
    <label>NAMA KESANGGUPAN</label>
    <input type="text" id="nk">
    <label>TARGET KELOMPOK (Rp)</label>
    <input type="number" id="tk">
    <button class="btn" onclick="addK()">SIMPAN</button>
    <button class="btn btn-secondary" onclick="closeM('modal-k')">BATAL</button>
</div>

<div id="modal-a" class="card modal">
    <label>NAMA / USERNAME / PIN / WA / TARGET</label>
    <input type="text" id="an" placeholder="Nama Lengkap">
    <input type="text" id="au" placeholder="Username Baru">
    <input type="password" id="ap" placeholder="PIN Baru">
    <input type="number" id="aw" placeholder="628xxxx">
    <select id="sel-k"></select>
    <input type="number" id="at" placeholder="Target Pribadi">
    <button class="btn" onclick="addA()">DAFTARKAN</button>
    <button class="btn btn-secondary" onclick="closeM('modal-a')">BATAL</button>
</div>

<script>
    const url = localStorage.getItem("SCRIPT_URL");
    function openM(id) { 
        document.getElementById(id).style.display='block';
        if(id=='modal-a') loadPrograms();
    }
    function closeM(id) { document.getElementById(id).style.display='none'; }

    function loadDash() {
        fetch(url + "?action=getDashboardAdmin").then(r=>r.json()).then(data=>{
            let h = "";
            data.forEach(i => {
                h += `<div class="card" style="text-align:center">
                    <h3>${i.nama}</h3>
                    <p>Terkumpul: Rp ${i.total.toLocaleString()}</p>
                    <p style="color:var(--accent)">Sisa: Rp ${i.sisa.toLocaleString()}</p>
                    <small>STATUS: ${i.status}</small>
                </div>`;
            });
            document.getElementById("dash").innerHTML = h;
        });
    }

    function loadPrograms() {
        fetch(url + "?action=getProgramList").then(r=>r.json()).then(d=>{
            let o = ""; d.forEach(p => o += `<option value="${p}">${p}</option>`);
            document.getElementById("sel-k").innerHTML = o;
        });
    }

    function addK() {
        const body = { action: "addKesanggupan", id: Date.now(), nama: document.getElementById("nk").value, target: document.getElementById("tk").value };
        fetch(url, { method:"POST", body: JSON.stringify(body) }).then(()=>location.reload());
    }

    function addA() {
        const body = { 
            action: "addAnggota", nama: document.getElementById("an").value, user: document.getElementById("au").value,
            pin: document.getElementById("ap").value, wa: document.getElementById("aw").value,
            program: document.getElementById("sel-k").value, target: document.getElementById("at").value
        };
        fetch(url, { method:"POST", body: JSON.stringify(body) }).then(()=>location.reload());
    }

    loadDash();
</script>
</body>
</html>
