<div id="modal-aksi" class="card" style="display:none; position:fixed; top:10%; left:5%; width:90%; z-index:1000; background:#161b22; border:2px solid var(--accent)">
    <h3 id="target-nama" style="text-align:center; color:var(--accent)">Nama Anggota</h3>
    <p id="target-info" style="text-align:center; font-size:0.8rem"></p>
    
    <label>INPUT CICILAN (Rp)</label>
    <input type="number" id="nom-admin" placeholder="0">
    <button class="btn" onclick="prosesBayarAdmin()">SIMPAN CICILAN</button>
    
    <button class="btn btn-secondary" onclick="kirimWAAdmin()" style="margin-top:10px">KIRIM WA KE ANGGOTA</button>
    <button class="btn btn-secondary" onclick="closeM('modal-aksi')" style="border-color:#ff4b2b; color:#ff4b2b">BATAL</button>
</div>

<script>
// Tambahkan variabel global untuk menyimpan data sementara anggota yang dipilih
let selectedUser = {};

// Modifikasi fungsi loadDash agar kartu bisa diklik
function loadDash() {
    setLoading(true);
    fetch(url + "?action=getDashboardAdmin").then(r=>r.json()).then(data=>{
        setLoading(false);
        let h = "";
        data.forEach(i => {
            // Kita akan buat fitur klik untuk melihat list anggota di tahap berikutnya, 
            // Untuk sekarang, kita buat tombol "AKSI" di tiap kartu
            h += `<div class="card" style="text-align:center">
                <h3 style="color:var(--accent);margin:0">${i.nama}</h3>
                <p style="font-size:0.8rem">Terkumpul: Rp ${i.total.toLocaleString()}</p>
                <button class="btn btn-secondary" style="font-size:0.7rem" onclick="pilihAnggota('${i.nama}')">KELOLA PEMBAYARAN</button>
            </div>`;
        });
        document.getElementById("dash").innerHTML = h;
    });
}

// Fungsi sederhana untuk admin input cicilan (Contoh alur: Admin manual input username)
function pilihAnggota(namaProg) {
    let userTgt = prompt("Masukkan Username Anggota:");
    if(!userTgt) return;
    
    setLoading(true);
    fetch(`${url}?action=getDataAnggota&username=${userTgt}`).then(r=>r.json()).then(res=>{
        setLoading(false);
        if(res.error) return alert("User tidak ditemukan!");
        selectedUser = { username: userTgt, program: namaProg, wa: "Cek di Sheet", nama: userTgt, res: res };
        
        document.getElementById("target-nama").innerText = userTgt;
        document.getElementById("target-info").innerText = `Program: ${namaProg} | Sisa: Rp ${(res.target - res.terbayar).toLocaleString()}`;
        document.getElementById("modal-aksi").style.display = 'block';
    });
}

function prosesBayarAdmin() {
    let n = document.getElementById("nom-admin").value;
    if(!n) return;
    setLoading(true);
    fetch(url, { 
        method:"POST", 
        body: JSON.stringify({ action:"addBayar", username:selectedUser.username, program:selectedUser.program, nominal:n }) 
    }).then(()=>location.reload());
}

function kirimWAAdmin() {
    // Logika kirim WA dari admin ke nomor anggota (Nomor diambil dari data anggota)
    alert("Fitur WA Admin sedang sinkronisasi nomor...");
}
</script>
