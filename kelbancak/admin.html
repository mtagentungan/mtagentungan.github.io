<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin - Dzikra System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
  <div class="header">
    <div>
      <h2>ADMIN PANEL</h2>
      <p id="adminInfo" style="color:var(--accent-light);font-size:0.85rem"></p>
    </div>
    <button class="btn btn-secondary" style="width:auto;padding:8px 15px" onclick="logout()">LOGOUT</button>
  </div>

  <div style="display:flex;gap:10px;margin-bottom:15px">
    <button class="btn" onclick="openModal('modalKesanggupan')">+ KESANGGUPAN</button>
    <button class="btn" onclick="openModal('modalAnggota')">+ ANGGOTA</button>
  </div>

  <input type="text" class="search-box" id="searchBox" placeholder="Cari program..." oninput="filterDash()">

  <div id="loader" class="loader">Memuat data...</div>
  <div id="dashboard"></div>
</div>

<!-- Modal Tambah Kesanggupan -->
<div id="modalKesanggupan" class="modal">
  <div class="modal-content">
    <h3>Tambah Kesanggupan</h3>
    <input type="text" id="ksNama" placeholder="Nama Kesanggupan">
    <input type="number" id="ksTarget" placeholder="Total Kesanggupan">
    <button class="btn" onclick="addKesanggupan()">SIMPAN</button>
    <button class="btn btn-secondary" onclick="closeModal('modalKesanggupan')">BATAL</button>
  </div>
</div>

<!-- Modal Tambah Anggota -->
<div id="modalAnggota" class="modal">
  <div class="modal-content">
    <h3>Tambah Anggota</h3>
    <input type="text" id="agNama" placeholder="Nama Lengkap">
    <input type="text" id="agUser" placeholder="Username">
    <input type="password" id="agPin" placeholder="PIN">
    <input type="text" id="agWa" placeholder="628xxx">
    <select id="agProgram"></select>
    <input type="number" id="agTarget" placeholder="Target Pribadi">
    <button class="btn" onclick="addAnggota()">DAFTARKAN</button>
    <button class="btn btn-secondary" onclick="closeModal('modalAnggota')">BATAL</button>
  </div>
</div>

<!-- Modal List Anggota -->
<div id="modalListAnggota" class="modal">
  <div class="modal-content" style="max-width:700px">
    <h3 id="judulProgram">Daftar Anggota</h3>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr><th>NAMA</th><th>WA</th><th>SISA</th><th>AKSI</th></tr>
        </thead>
        <tbody id="tabelAnggota"></tbody>
      </table>
    </div>
    <button class="btn btn-secondary" onclick="closeModal('modalListAnggota')">TUTUP</button>
  </div>
</div>

<!-- Modal Aksi Anggota -->
<div id="modalAksi" class="modal">
  <div class="modal-content">
    <h3 id="aksiNama"></h3>
    <p id="aksiInfo" style="color:var(--text-dim);margin-bottom:15px"></p>
    <input type="number" id="nominalBayar" placeholder="Nominal Nyicil">
    <button class="btn" id="btnBayar" onclick="prosesBayar()">SIMPAN PEMBAYARAN</button>
    <button class="btn btn-secondary" onclick="kirimWA()">KIRIM WA</button>
    <button class="btn btn-danger" onclick="closeModal('modalAksi')">BATAL</button>
  </div>
</div>


  <script src="config.js"></script>
<script>
const SCRIPT_URL = CONFIG.SCRIPT_URL;
  const user=JSON.parse(sessionStorage.getItem('user'));
let selectedUser={},allData=[];

if(!user||user.role!=='admin')window.location.href='index.html';
document.getElementById('adminInfo').textContent='Admin: '+user.nama;

function openModal(id){document.getElementById(id).style.display='block'}
function closeModal(id){document.getElementById(id).style.display='none'}

function setLoading(s){document.getElementById('loader').style.display=s?'block':'none'}

function loadDash(){
  setLoading(true);
  fetch(SCRIPT_URL+'?action=getDashboardAdmin')
 .then(r=>r.json())
 .then(data=>{
    setLoading(false);
    allData=data;
    renderDash(data);
  });
}

function renderDash(data){
  let html='';
  data.forEach(i=>{
    const statusClass=i.status==='aktif'?'badge-active':'badge-done';
    html+=`
    <div class="card" onclick="${i.status==='aktif'?`bukaProgram('${i.nama}')`:''}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3>${i.nama}</h3>
        <span class="badge ${statusClass}">${i.status.toUpperCase()}</span>
      </div>
      <p style="margin:10px 0;color:var(--text-dim)">
        Terkumpul: <b>Rp ${i.total.toLocaleString()}</b><br>
        Sisa: <b>Rp ${i.sisa.toLocaleString()}</b>
      </p>
    </div>`;
  });
  document.getElementById('dashboard').innerHTML=html||'<p>Belum ada program.</p>';
}

function filterDash(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  const filtered=allData.filter(d=>d.nama.toLowerCase().includes(q));
  renderDash(filtered);
}

function bukaProgram(namaProg){
  setLoading(true);
  fetch(`${SCRIPT_URL}?action=getListAnggotaPerProgram&program=${namaProg}`)
 .then(r=>r.json())
 .then(res=>{
    setLoading(false);
    document.getElementById('judulProgram').textContent=namaProg;
    let html='';
    res.forEach(a=>{
      const sisa=a.target-a.terbayar;
      html+=`
      <tr>
        <td>${a.namaAsli}<br><small>@${a.username}</small></td>
        <td>${a.wa}</td>
        <td style="color:${sisa<=0?'var(--accent-light)':'var(--danger)'}">
          ${sisa<=0?'LUNAS':sisa.toLocaleString()}
        </td>
        <td>
          <button class="btn" style="padding:5px 10px;font-size:0.8rem"
            onclick="bukaAksi('${a.username}','${namaProg}')">⚙️</button>
        </td>
      </tr>`;
    });
    document.getElementById('tabelAnggota').innerHTML=html||'<tr><td colspan="4">Kosong</td></tr>';
    openModal('modalListAnggota');
  });
}

function bukaAksi(username,namaProg){
  closeModal('modalListAnggota');
  setLoading(true);
  fetch(`${SCRIPT_URL}?action=getDetailAnggotaAdmin&username=${username}&program=${namaProg}`)
 .then(r=>r.json())
 .then(res=>{
    setLoading(false);
    selectedUser={...res,program:namaProg};
    document.getElementById('aksiNama').textContent=res.namaAsli.toUpperCase();
    document.getElementById('aksiInfo').textContent=`Sisa: Rp ${(res.target-res.terbayar).toLocaleString()}`;
    openModal('modalAksi');
  });
}

function prosesBayar(){
  const nominal=document.getElementById('nominalBayar').value;
  if(!nominal||nominal<=0)return alert('Isi nominal valid');

  const btn=document.getElementById('btnBayar');
  btn.disabled=true;

  fetch(SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      action:'addBayar',
      username:selectedUser.username,
      program:selectedUser.program,
      nominal:nomial
    })
  })
 .then(()=>location.reload());
}

function kirimWA(){
  const sisa=selectedUser.target-selectedUser.terbayar;
  const sisaTxt=sisa<=0?'SELESAI':`Rp. ${sisa.toLocaleString()}`;
  let riwayat='';
  selectedUser.riwayat.forEach(r=>{
    riwayat+=`${r.tanggal} - Rp. ${r.nominal.toLocaleString()}\n`;
  });

  const pesan=`Assalaamu'alaikum,
Mas ${selectedUser.namaAsli.toUpperCase()}, berikut ini adalah rincian anda untuk kesanggupan *${selectedUser.program}* :

Link: https://mtagentungan.github.io
Username: ${selectedUser.username}
PIN: ${selectedUser.pin}
Kesanggupan: Rp.${selectedUser.target.toLocaleString()}
Total titip: Rp.${selectedUser.terbayar.toLocaleString()}
Kekurangan: ${sisaTxt}

Berikut rincian pembayaran:

${riwayat}


> _Bendahara II Kelompok Bancak_`;

  const waNum=selectedUser.wa.replace(/^0/,'62').replace(/\D/g,'');
  window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(pesan)}`,'_blank');
}

function loadPrograms(){
  fetch(SCRIPT_URL+'?action=getProgramList')
 .then(r=>r.json())
 .then(d=>{
    let opt='<option value="">Pilih Kesanggupan</option>';
    d.forEach(p=>opt+=`<option value="${p}">${p}</option>`);
    document.getElementById('agProgram').innerHTML=opt;
  });
}

function addKesanggupan(){
  const nama=document.getElementById('ksNama').value;
  const target=document.getElementById('ksTarget').value;
  if(!nama||!target)return alert('Lengkapi data');

  fetch(SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'addKesanggupan',id:Date.now(),nama,target})
  }).then(()=>location.reload());
}

function addAnggota(){
  const wa=document.getElementById('agWa').value.replace(/^0/,'62').replace(/\D/g,'');
  const body={
    action:'addAnggota',
    nama:document.getElementById('agNama').value,
    user:document.getElementById('agUser').value,
    pin:document.getElementById('agPin').value,
    wa:wa,
    program:document.getElementById('agProgram').value,
    target:document.getElementById('agTarget').value,
    role:'anggota'
  };
  if(!body.user||!body.pin)return alert('Username dan PIN wajib');

  fetch(SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(()=>location.reload());
}

function logout(){
  sessionStorage.clear();
  window.location.href='index.html';
}

loadDash();
loadPrograms();
</script>
</body>
</html>
