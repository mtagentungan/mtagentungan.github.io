<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Anggota - Dzikra System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
  <div class="header">
    <h2 id="sapaan"></h2>
    <button class="btn btn-secondary" style="width:auto;padding:8px 15px" onclick="logout()">LOGOUT</button>
  </div>

  <div class="card">
    <p>Kesanggupan Pribadi</p>
    <h3 id="target">Rp 0</h3>
    <p style="margin-top:10px">Sudah Membayar</p>
    <h3 id="terbayar" style="color:var(--accent-light)">Rp 0</h3>
    <p style="margin-top:10px">Kekurangan</p>
    <h3 id="sisa" style="color:var(--danger)">Rp 0</h3>
  </div>

  <div class="card">
    <h3>Riwayat Pembayaran</h3>
    <div id="riwayat"></div>
  </div>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycby37ucC2AjnbKzUBFvoeokJMuo-ZcjCQP_PMC71HBZ7E37z576b8f8vItuNoFkSWEQj/exec';
const user=JSON.parse(sessionStorage.getItem('user'));

if(!user||user.role!=='anggota')window.location.href='index.html';

document.getElementById('sapaan').textContent=`Assalamu'alaikum mas ${user.nama}`;

fetch(`${SCRIPT_URL}?action=getDetailAnggotaAdmin&username=${user.username}&program=${user.program}`)
.then(r=>r.json())
.then(res=>{
  document.getElementById('target').textContent=`Rp ${res.target.toLocaleString()}`;
  document.getElementById('terbayar').textContent=`Rp ${res.terbayar.toLocaleString()}`;
  document.getElementById('sisa').textContent=`Rp ${(res.target-res.terbayar).toLocaleString()}`;

  let html='';
  res.riwayat.forEach(r=>{
    html+=`<p style="padding:8px 0;border-bottom:1px solid var(--border)">
      ${r.tanggal} | Rp ${r.nominal.toLocaleString()}
    </p>`;
  });
  document.getElementById('riwayat').innerHTML=html||'<p>Belum ada pembayaran</p>';
});

function logout(){
  sessionStorage.clear();
  window.location.href='index.html';
}
</script>
</body>
</html>
