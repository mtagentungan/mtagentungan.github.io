<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Datang</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      text-align: center;
      margin-top: 20vh;
      animation: fadeIn 1s ease-in;
    }
    .hero h1 {
      font-size: 32px;
      color: var(--accent-cyan);
      text-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
      margin-bottom: 10px;
    }
    .hero p {
      color: var(--text-secondary);
      font-size: 16px;
      margin-bottom: 40px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Assalamu'alaikum</h1>
    <p>Selamat datang di Sistem Kesanggupan Kelompok Bancak</p>
    <button onclick="location.href='login.html'">MASUK APLIKASI</button>
  </div>
</body>
</html>
