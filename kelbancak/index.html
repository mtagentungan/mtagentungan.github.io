<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelompok Bancak</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:20px;background:#f5f5f5}
.container{max-width:800px;margin:0 auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
h2,h3,h4{color:#2c3e50;margin-top:20px}
.card{border:1px solid #ddd;padding:15px;margin:10px 0;border-radius:5px}
.badge{padding:4px 8px;border-radius:4px;font-size:12px;color:#fff}
.badge-aktif{background:#27ae60}
.badge-selesai{background:#7f8c8d}
input,button,select{padding:10px;margin:5px 0;width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:4px}
button{background:#3498db;color:#fff;border:none;cursor:pointer;font-weight:bold}
button:hover{background:#2980b9}
button.danger{background:#e74c3c}
button.success{background:#27ae60}
button.danger:hover{background:#c0392b}
button.success:hover{background:#229954}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px;text-align:left}
th{background:#ecf0f1}
.hidden{display:none}
.header-top{display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class="container">
  <h2>Kelompok Bancak</h2>

  <!-- Halaman Awal -->
  <div id="page-home">
    <h3>List Kesanggupan</h3>
    <div id="list-kesanggupan">Loading...</div>

    <h3>Login</h3>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="pin" placeholder="PIN">
    <button onclick="login()">Login</button>
    <p id="login-error" style="color:red"></p>
  </div>

  <!-- Halaman Admin -->
  <div id="page-admin" class="hidden">
    <div class="header-top">
      <h3>Dashboard Admin</h3>
      <button class="danger" style="width:auto" onclick="logout()">Logout</button>
    </div>
    <div id="list-anggota">Loading...</div>
  </div>

  <!-- Halaman Anggota -->
  <div id="page-anggota" class="hidden">
    <div class="header-top">
      <h3 id="sapaan"></h3>
      <button class="danger" style="width:auto" onclick="logout()">Logout</button>
    </div>
    <div id="info-anggota"></div>
    <div id="form-target"></div>
    <h4>Riwayat Pembayaran</h4>
    <div id="riwayat-bayar"></div>
  </div>
</div>

<script src="config.js"></script>
<script>
const SCRIPT_URL = CONFIG.SCRIPT_URL;
let currentUser = null;

window.onload = () => {
  loadKesanggupan();
  const saved = localStorage.getItem('user');
  if(saved){
    currentUser = JSON.parse(saved);
    showPage(currentUser.role);
  }
}

async function api(action, data={}, method='GET'){
  const opt = method==='POST'?{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action,...data})
  }:{};

  const url = method==='GET'?`${SCRIPT_URL}?action=${action}&${new URLSearchParams(data)}`:SCRIPT_URL;
  const res = await fetch(url,opt);
  if(!res.ok) throw new Error('Koneksi gagal');
  return res.json();
}

async function loadKesanggupan(){
  try{
    const data = await api('getKesanggupanList');
    let html = '';
    data.forEach(k=>{
      html += `<div class="card">
        <strong>${k.nama}</strong>
        <span class="badge badge-${k.status}">${k.status}</span><br>
        Target: Rp ${k.target.toLocaleString('id')}<br>
        Terkumpul: Rp ${k.terkumpul.toLocaleString('id')}<br>
        Kurang: Rp ${k.sisa.toLocaleString('id')}
      </div>`;
    });
    document.getElementById('list-kesanggupan').innerHTML = html || '<p>Belum ada kesanggupan</p>';
  }catch(e){
    document.getElementById('list-kesanggupan').innerHTML = '<p style="color:red">Gagal load data</p>';
  }
}

async function login(){
  const username = document.getElementById('username').value.trim();
  const pin = document.getElementById('pin').value.trim();
  document.getElementById('login-error').textContent = '';
  
  if(!username || !pin){
    document.getElementById('login-error').textContent = 'Isi username dan PIN';
    return;
  }

  try{
    const res = await api('login',{username,pin},'POST');
    if(res.status==='success'){
      currentUser = res.user;
      localStorage.setItem('user',JSON.stringify(currentUser));
      showPage(currentUser.role);
    }else{
      document.getElementById('login-error').textContent = res.message;
    }
  }catch(e){
    document.getElementById('login-error').textContent = 'Koneksi gagal. Cek URL GAS';
  }
}

function logout(){
  localStorage.removeItem('user');
  currentUser = null;
  document.getElementById('username').value = '';
  document.getElementById('pin').value = '';
  showPage('home');
}

function showPage(role){
  document.getElementById('page-home').classList.add('hidden');
  document.getElementById('page-admin').classList.add('hidden');
  document.getElementById('page-anggota').classList.add('hidden');

  if(role==='admin'){
    document.getElementById('page-admin').classList.remove('hidden');
    loadAdminDashboard();
  }else if(role==='anggota'){
    document.getElementById('page-anggota').classList.remove('hidden');
    loadAnggotaDetail();
  }else{
    document.getElementById('page-home').classList.remove('hidden');
    loadKesanggupan();
  }
}

async function loadAdminDashboard(){
  try{
    const data = await api('getAdminDashboard');
    let html = '';
    data.forEach(a=>{
      html += `<div class="card">
        <strong>${a.nama}</strong><br>
        Kesanggupan: Rp ${a.target.toLocaleString('id')}<br>
        Nyicil: Rp ${a.terbayar.toLocaleString('id')}<br>
        Kurang: Rp ${a.sisa.toLocaleString('id')}<br>
        <button class="success" onclick="kirimWA('${a.wa}','${a.nama}','${a.username}','${a.pin}')">Kirim WA</button>
        <button onclick="promptNyicil('${a.username}','${a.program_id}')">NYICIL</button>
      </div>`;
    });
    document.getElementById('list-anggota').innerHTML = html || '<p>Belum ada anggota</p>';
  }catch(e){
    document.getElementById('list-anggota').innerHTML = '<p style="color:red">Gagal load data</p>';
  }
}

function kirimWA(wa,nama,user,pin){
  const msg = `Assalamualaikum ${nama},\n\nIni data akun Kelompok Bancak:\nUsername: ${user}\nPIN: ${pin}\n\nSilakan login untuk cek kesanggupan Anda.`;
  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(msg)}`,'_blank');
}

async function promptNyicil(username,program_id){
  const nominal = prompt('Masukkan nominal nyicil:');
  if(!nominal || isNaN(nominal) || nominal<=0) return;
  try{
    await api('addBayar',{username,program_id,nominal},'POST');
    alert('Pembayaran berhasil');
    loadAdminDashboard();
  }catch(e){
    alert('Gagal simpan pembayaran');
  }
}

async function loadAnggotaDetail(){
  try{
    const data = await api('getAnggotaDetail',{username:currentUser.username});
    document.getElementById('sapaan').textContent = `Halo, ${data.nama}`;

    document.getElementById('info-anggota').innerHTML = `
      <div class="card">
        Kesanggupan Pribadi: Rp ${data.target_pribadi.toLocaleString('id')}<br>
        Sudah Bayar: Rp ${data.terbayar.toLocaleString('id')}<br>
        Kurang: Rp ${data.sisa.toLocaleString('id')}
      </div>
    `;

    if(data.target_pribadi===0){
      document.getElementById('form-target').innerHTML = `
        <h4>Set Kesanggupan Pribadi</h4>
        <input type="number" id="target-pribadi" placeholder="Masukkan nominal">
        <button onclick="setTarget()">Simpan</button>
      `;
    }else{
      document.getElementById('form-target').innerHTML = '';
    }

    let riwayatHtml = '<table><tr><th>Tanggal</th><th>Hari</th><th>Jam</th><th>Nominal</th></tr>';
    if(data.riwayat.length===0){
      riwayatHtml += '<tr><td colspan="4">Belum ada pembayaran</td></tr>';
    }else{
      data.riwayat.forEach(r=>{
        riwayatHtml += `<tr><td>${r.tanggal}</td><td>${r.hari}</td><td>${r.jam}</td><td>Rp ${r.nominal.toLocaleString('id')}</td></tr>`;
      });
    }
    riwayatHtml += '</table>';
    document.getElementById('riwayat-bayar').innerHTML = riwayatHtml;
  }catch(e){
    document.getElementById('info-anggota').innerHTML = '<p style="color:red">Gagal load data</p>';
  }
}

async function setTarget(){
  const target = document.getElementById('target-pribadi').value;
  if(!target || target<=0){
    alert('Masukkan nominal yang valid');
    return;
  }
  try{
    const res = await api('setTargetPribadi',{username:currentUser.username,target},'POST');
    if(res.status==='success'){
      alert('Kesanggupan tersimpan');
      loadAnggotaDetail();
    }else{
      alert(res.message);
    }
  }catch(e){
    alert('Gagal simpan');
  }
}
</script>
</body>
</html>
