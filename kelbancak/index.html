<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penggalangan Dana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header-islami">
    <h2>Sistem Penggalangan Dana</h2>
</div>

<div class="card" style="max-width: 400px; margin: 20px auto;">
    <h3>Login</h3>
    <p>Silakan masukan username dan PIN anda</p>
    
    <label>Username:</label><br>
    <input type="text" id="username" style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>
    
    <label>PIN:</label><br>
    <input type="password" id="pin" style="width: 100%; padding: 8px; margin-bottom: 20px;"><br>
    
    <button onclick="login()" style="width: 100%;">LOGIN</button>
</div>

<script>
    // Ganti URL ini dengan URL Web App Google Apps Script Anda
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyr-B5L1qR8yxZPcFQFA42JSAkjnrQfPEtvrZaGveXS5i4w0jfUSqYSXgbHFYMiVwxQ/exec";

    async function login() {
        const user = document.getElementById("username").value;
        const pin = document.getElementById("pin").value;
        
        // Simulasi fetch data dari GAS
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            
            // Logika pencocokan data (disesuaikan dengan struktur sheets Anda)
            const userAccount = data.find(item => item.username == user && item.pin == pin);
            
            if(userAccount) {
                localStorage.setItem("user", JSON.stringify(userAccount));
                window.location.href = userAccount.role === 'admin' ? 'admin.html' : 'anggota.html';
            } else {
                alert("Username atau PIN salah!");
            }
        } catch (error) {
            alert("Gagal terhubung ke database. Cek koneksi atau URL GAS.");
        }
    }
</script>

</body>
</html>
