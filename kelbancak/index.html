<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login - Dzikra System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
  <div class="card" style="max-width:400px;margin:100px auto">
    <h2 style="text-align:center">LOGIN</h2>
    <p style="text-align:center;color:var(--text-dim);margin-bottom:20px">
      Silakan masukkan username dan PIN anda
    </p>

    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="pin" placeholder="PIN" autocomplete="off">
    <button class="btn" id="btnLogin" onclick="login()">LOGIN</button>

    <div class="loader" id="loader">Menghubungkan...</div>
    <div class="error" id="error"></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxtD5NLmHIGNBHnCbd8gr3aIPekg1bJMNkRsQkenConGc5Z9jfB4I45x76aDmyNTzau/exec';

function login(){
  const username=document.getElementById('username').value.trim();
  const pin=document.getElementById('pin').value.trim();
  const loader=document.getElementById('loader');
  const error=document.getElementById('error');
  const btn=document.getElementById('btnLogin');

  if(!username||!pin){
    error.textContent='Username dan PIN wajib diisi';
    return;
  }

  loader.style.display='block';
  error.textContent='';
  btn.disabled=true;

  fetch(SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'login',username,pin})
  })
 .then(r=>r.json())
 .then(res=>{
    loader.style.display='none';
    btn.disabled=false;
    if(res.status==='success'){
      sessionStorage.setItem('user',JSON.stringify(res.user));
      if(res.user.role==='admin'){
        window.location.href='admin.html';
      }else{
        window.location.href='anggota.html';
      }
    }else{
      error.textContent=res.message;
    }
  })
 .catch(()=>{
    loader.style.display='none';
    btn.disabled=false;
    error.textContent='Koneksi gagal. Coba lagi.';
  });
}

document.addEventListener('keypress',e=>{
  if(e.key==='Enter')login();
});
</script>
</body>
</html>
