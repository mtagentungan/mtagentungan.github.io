<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Manajemen Dana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- CONTAINER UTAMA -->
    <div id="app">
        <!-- Tambahkan ini di bagian mana saja (misalnya sebelum halaman login) -->
<div id="index-display" class="card">
    <h2 class="header">PROGRES KESANGGUPAN</h2>
    <div id="data-list">Loading data...</div>
</div>

<script>
    // Memanggil fungsi dari GAS saat halaman dimuat
    window.onload = function() {
        google.script.run.withSuccessHandler(renderData).getKesanggupanData();
    };

    function renderData(data) {
        let container = document.getElementById('data-list');
        container.innerHTML = ''; // Kosongkan loading

        data.forEach(row => {
            // Asumsi kolom: [ID, Nama Kesanggupan, Target, Terkumpul, Status]
            let html = `
                <div class="card" style="border-left: 5px solid #00ff9d;">
                    <h3>${row[1]}</h3> <!-- Nama Kesanggupan -->
                    <p>Target: Rp ${row[2].toLocaleString()}</p>
                    <p>Terkumpul: Rp ${row[3].toLocaleString()}</p>
                </div>
            `;
            container.innerHTML += html;
        });
    }
</script>

        <!-- HALAMAN LOGIN -->
        <div id="login-page" class="card">
            <h2 class="header">LOGIN SYSTEM</h2>
            <label>Username</label>
            <input type="text" id="username" placeholder="Masukan Username">
            <br><br>
            <label>PIN</label>
            <input type="password" id="pin" placeholder="Masukan PIN">
            <br><br>
            <button onclick="login()">LOGIN</button>
        </div>

        <!-- HALAMAN ADMIN (Default disembunyikan) -->
        <div id="admin-page" class="card" style="display:none;">
            <h2 class="header">PANEL ADMIN</h2>
            <div id="admin-content">
                <!-- List data kesanggupan akan dimuat di sini oleh JS -->
            </div>
            <hr>
            <button onclick="logout()">LOGOUT</button>
        </div>

        <!-- HALAMAN ANGGOTA (Default disembunyikan) -->
        <div id="member-page" class="card" style="display:none;">
            <h2 class="header">DASHBOARD ANGGOTA</h2>
            <div id="member-content">
                <!-- Data pribadi anggota dimuat di sini -->
            </div>
            <button onclick="logout()">LOGOUT</button>
        </div>

    </div>

    <script>
        // FUNGSI NAVIGASI SEDERHANA
        function showPage(pageId) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('admin-page').style.display = 'none';
            document.getElementById('member-page').style.display = 'none';
            document.getElementById(pageId).style.display = 'block';
        }

        // FUNGSI LOGIN (Contoh logika)
        function login() {
            const user = document.getElementById('username').value;
            const pin = document.getElementById('pin').value;
            
            // Di sini nanti Anda hubungkan dengan google.script.run
            // Untuk simulasi, kita arahkan ke admin jika username admin
            if(user === 'admin') {
                showPage('admin-page');
            } else {
                showPage('member-page');
            }
        }

        function logout() {
            showPage('login-page');
        }
    </script>
</body>
</html>
