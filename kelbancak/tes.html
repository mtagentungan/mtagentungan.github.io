<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keuangan Kelompok Bancak</title>
    <!-- Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js"></script>
    <style>
        /* Masukkan CSS Anda di sini agar tetap rapi */
        .signature-container { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        canvas { width: 100%; height: 150px; background: #fafafa; border: 1px dashed #999; }
    </style>
</head>
<body>
    <header><h1>Kelompok Bancak</h1></header>
    <div class="container">
        <!-- Dashboard/View Section -->
        <div id="view-anggota" class="view-section">
            <button onclick="openNyicilModal()">+ Input Cicilan</button>
        </div>
    </div>

    <!-- Modal Cicilan -->
    <div id="nyicil-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <form id="nyicil-form">
                <input type="number" id="nyicil-nominal" placeholder="Nominal" required>
                <div class="signature-container">
                    <canvas id="sig-pad"></canvas>
                </div>
                <button type="button" onclick="sig.clear()">Hapus</button>
                <button type="submit">Simpan</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyBOSPFTuEq8cvAXbTrdQxwfYxDWMhZbY62UD3_yc5YfQZ0BQUABwmDSuKilAYJxb5TCA/exec";
        const sig = new SignaturePad(document.getElementById('sig-pad'));
        
        function openNyicilModal() { document.getElementById('nyicil-modal').style.display = 'flex'; }
        
        // Logika pengiriman data ke GAS
        document.getElementById('nyicil-form').onsubmit = (e) => {
            e.preventDefault();
            const data = {
                action: 'tambahCicilan',
                nominal: document.getElementById('nyicil-nominal').value,
                ttd: sig.toDataURL()
            };
            fetch(API_URL, { method: 'POST', body: JSON.stringify(data) })
            .then(res => alert("Berhasil!"));
        };
    </script>
</body>
</html>
