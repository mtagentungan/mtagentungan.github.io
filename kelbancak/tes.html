<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keuangan Kelompok Bancak</title>
    <!-- Library Signature Pad -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --secondary-color: #18bc9c; --accent-color: #e74c3c; --bg-color: #f8f9fa; --card-bg: #ffffff; --border-color: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); padding-bottom: 60px; }
        .container { width: 100%; max-width: 900px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .form-control { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--border-color); border-radius: 4px; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: 600; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        /* Signature Canvas Style */
        .signature-container { border: 1px solid var(--border-color); margin: 10px 0; background: #fafafa; }
        canvas { width: 100%; height: 150px; touch-action: none; cursor: crosshair; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:white; padding:20px; border-radius:8px; width:90%; max-width:400px; }
    </style>
</head>
<body>

<header style="background:var(--primary-color); color:white; padding:20px; text-align:center;">
    <h1>Kelompok Bancak</h1>
</header>

<div class="container">
    <!-- VIEW PUBLIK (Login + Riwayat Setoran) -->
    <div id="view-publik" class="view-section active">
        <div class="card">
            <h3>Login</h3>
            <form id="login-form">
                <input type="text" id="username" class="form-control" placeholder="Username" required>
                <input type="password" id="password" class="form-control" placeholder="Password" required>
                <button type="submit" class="btn" style="background:var(--secondary-color); width:100%;">Masuk</button>
            </form>
        </div>
        <div class="card">
            <h3>Riwayat Setoran ke Bendahara</h3>
            <div id="riwayat-setoran-list">Memuat riwayat...</div>
        </div>
    </div>

    <!-- VIEW ANGGOTA/ADMIN (Dashboard) -->
    <div id="view-dashboard" class="view-section">
        <div class="card">
            <h3 id="welcome-msg">Dashboard</h3>
            <button id="logout-btn" class="btn" style="background:var(--accent-color);" onclick="logout()">Logout</button>
            <button id="admin-setor-btn" class="btn" style="background:blue; display:none;" onclick="openModal('setor-modal')">+ Setor Bendahara</button>
        </div>
    </div>
</div>

<!-- MODAL INPUT CICILAN -->
<div id="nyicil-modal" class="modal">
    <div class="modal-content">
        <form id="nyicil-form">
            <input type="number" id="nyicil-nominal" class="form-control" placeholder="Nominal" required>
            <div class="signature-container"><canvas id="sig-pad-nyicil"></canvas></div>
            <button type="button" onclick="sigNyicil.clear()">Hapus TTD</button>
            <button type="submit" class="btn" style="background:var(--secondary-color);">Simpan Cicilan</button>
        </form>
    </div>
</div>

<!-- MODAL SETOR BENDAHARA (Untuk Admin) -->
<div id="setor-modal" class="modal">
    <div class="modal-content">
        <form id="setor-form">
            <input type="date" id="setor-tanggal" class="form-control" required>
            <input type="number" id="setor-nominal" class="form-control" placeholder="Nominal Setor" required>
            <div class="signature-container"><canvas id="sig-pad-setor"></canvas></div>
            <button type="button" onclick="sigSetor.clear()">Hapus TTD</button>
            <button type="submit" class="btn" style="background:blue;">Simpan Setoran</button>
        </form>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyBOSPFTuEq8cvAXbTrdQxwfYxDWMhZbY62UD3_yc5YfQZ0BQUABwmDSuKilAYJxb5TCA/exec"; // <--- GANTI INI
    const sigNyicil = new SignaturePad(document.getElementById('sig-pad-nyicil'));
    const sigSetor = new SignaturePad(document.getElementById('sig-pad-setor'));

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Contoh Fungsi Submit Cicilan
    document.getElementById('nyicil-form').onsubmit = (e) => {
        e.preventDefault();
        if (sigNyicil.isEmpty()) return alert("Tanda tangan wajib!");
        fetch(API_URL, { method: 'POST', body: JSON.stringify({ 
            action: 'tambahCicilan', 
            nominal: document.getElementById('nyicil-nominal').value,
            ttd: sigNyicil.toDataURL() 
        })}).then(() => alert("Data Tersimpan"));
    };

    function logout() {
        localStorage.clear();
        location.reload();
    }
</script>
</body>
</html>
