<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Warga MTA MJG 3 (GAS)</title>
    <style>
        /* Desain Standar untuk Laptop / Desktop */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f8f9fa; color: #333; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; font-size: 24px; }
        .search-container { display: flex; justify-content: center; margin-bottom: 25px; }
        input[type="text"] { padding: 12px 20px; width: 100%; max-width: 400px; border: 2px solid #cbd5e1; border-radius: 25px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: #2ecc71; }
        .table-responsive { overflow-x: auto; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background-color: #2ecc71; color: white; font-weight: 600; }
        tr:hover { background-color: #f1f5f9; }
        .loading { text-align: center; font-style: italic; color: #7f8c8d; font-size: 16px; margin-top: 40px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-l { background-color: #e0f2fe; color: #0369a1; }
        .badge-p { background-color: #fce7f3; color: #9d174d; }

        /* --- MEDIA QUERY KHUSUS UNTUK HP / MOBILE (Lebar Layar Maksimal 768px) --- */
        @media screen and (max-width: 768px) {
            body { margin: 10px; } /* Mengurangi jarak pinggir layar */
            h2 { font-size: 18px; margin-bottom: 15px; } /* Mengecilkan judul utama */
            
            .search-container { margin-bottom: 15px; padding: 0 5px; }
            input[type="text"] { padding: 10px 15px; font-size: 14px; } /* Mengecilkan kotak pencarian */
            
            th, td { padding: 10px 8px; font-size: 12px; } /* Mengecilkan font & jarak di dalam tabel warga */
            .badge { padding: 2px 5px; font-size: 10px; } /* Mengecilkan badge gender */
            .loading { font-size: 14px; }
        }
    </style>
</head>
<body>

    <h2>Database Warga MTA MJG 3</h2>
    
    <div class="search-container">
        <input type="text" id="searchInput" oninput="searchName()" placeholder="Cari nama warga di sini...">
    </div>

    <div id="loading" class="loading">Memuat data secara aman via Google API...</div>

    <div class="table-responsive" id="tableWrapper" style="display:none;">
        <table id="wargaTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nama</th>
                    <th>Gender</th>
                    <th>Status</th>
                    <th>RT</th>
                    <th>Tempat Lahir</th>
                    <th>No. HP</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        // GANTI DENGAN LINK WEB APP GAS ANDA YANG SUDAH BERHASIL TADI
        const gasUrl = 'https://script.google.com/macros/s/AKfycbz8JE2Vr0LFF0ykYTJJDiQSm6fCmN83Idjur4Tb3JLf_cfbfSp5GkWhNGLiWWV2hl5ITA/exec';
        
        let semuaData = [];

        async function ambilData() {
            try {
                const response = await fetch(gasUrl);
                semuaData = await response.json();

                tampilkanData(semuaData);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('tableWrapper').style.display = 'block';

            } catch (error) {
                console.error('Gagal memuat data via GAS:', error);
                document.getElementById('loading').innerText = 'Gagal memuat data. Periksa kembali konfigurasi Apps Script Anda.';
            }
        }

        function tampilkanData(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:gray;">Data tidak ditemukan</td></tr>`;
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                const genderBadge = item.gender === 'L' ? `<span class="badge badge-l">L</span>` : (item.gender === 'P' ? `<span class="badge badge-p">P</span>` : item.gender);
                
                tr.innerHTML = `
                    <td><strong>${item.id}</strong></td>
                    <td>${item.nama}</td>
                    <td>${genderBadge}</td>
                    <td>${item.status}</td>
                    <td>${item.rt}</td>
                    <td>${item.tempatLahir}</td>
                    <td>${item.noHp}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function searchName() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const hasilFilter = semuaData.filter(item => item.nama.toLowerCase().includes(input));
            tampilkanData(hasilFilter);
        }

        window.onload = ambilData;
    </script>
</body>
</html>
