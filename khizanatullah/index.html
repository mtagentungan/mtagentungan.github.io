<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kasir</title>
    <style>
        /* CSS Tambahan untuk Search Bar */
        #searchBar {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Daftar Menu Barang</h2>
    
    <input type="text" id="searchBar" placeholder="Cari nama barang..." onkeyup="filterBarang()">
    
    <table id="tabelBarang">
        <thead>
            <tr>
                <th>Nama Barang</th>
                <th>Harga</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="bodyBarang">
            </tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyMcJLY-2btGvN5zyvqcsRZDMlTQInR2SGxF3JdAVhLHgDoYVumzykr13DguA9gNPE/exec';
    let dataBarang = [];

    async function init() {
        const cachedData = localStorage.getItem('dataBarang');
        
        // 1. Cek apakah ada data di cache
        if (cachedData) {
            console.log("Memuat data dari cache...");
            dataBarang = JSON.parse(cachedData);
            renderTable(dataBarang);
            
            // Opsional: Tetap ambil data terbaru di latar belakang (background sync)
            updateDataFromSheet();
        } else {
            // 2. Jika tidak ada cache, ambil dari API
            updateDataFromSheet();
        }
    }

    async function updateDataFromSheet() {
        try {
            const res = await fetch(SCRIPT_URL);
            const newData = await res.json();
            
            // Simpan ke localStorage agar bisa diakses saat offline/refresh berikutnya
            localStorage.setItem('dataBarang', JSON.stringify(newData));
            
            dataBarang = newData;
            renderTable(dataBarang);
            console.log("Data diperbarui dari Google Sheets.");
        } catch (err) {
            if (!localStorage.getItem('dataBarang')) {
                alert("Gagal memuat data. Periksa koneksi Anda.");
            }
        }
    }

    function renderTable(data) {
        const body = document.getElementById('bodyBarang');
        body.innerHTML = '';
        data.forEach(item => {
            body.innerHTML += `
                <tr>
                    <td>${item.nama}</td>
                    <td>Rp ${parseInt(item.harga).toLocaleString('id-ID')}</td>
                    <td><button onclick="alert('${item.nama} ditambahkan')">Tambah</button></td>
                </tr>`;
        });
    }

    function filterBarang() {
        const keyword = document.getElementById('searchBar').value.toLowerCase();
        const filtered = dataBarang.filter(item => 
            item.nama.toLowerCase().includes(keyword)
        );
        renderTable(filtered);
    }

    window.onload = init;
</script>
    
</body>
</html>
