<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kasir</title>
    <style>
        /* CSS Tambahan untuk Search Bar */
        #searchBar {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Daftar Menu Barang</h2>
    
    <input type="text" id="searchBar" placeholder="Cari nama barang..." onkeyup="filterBarang()">
    
    <table id="tabelBarang">
        <thead>
            <tr>
                <th>Nama Barang</th>
                <th>Harga</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="bodyBarang">
            </tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyMcJLY-2btGvN5zyvqcsRZDMlTQInR2SGxF3JdAVhLHgDoYVumzykr13DguA9gNPE/exec';
    let dataBarang = []; // Variabel untuk menyimpan data agar tidak fetch berkali-kali

    // Fungsi Ambil Data (Hanya dijalankan sekali)
    async function init() {
        try {
            const res = await fetch(SCRIPT_URL);
            dataBarang = await res.json();
            renderTable(dataBarang);
        } catch (err) {
            alert("Gagal memuat data");
        }
    }

    // Fungsi untuk menampilkan data ke tabel
    function renderTable(data) {
        const body = document.getElementById('bodyBarang');
        body.innerHTML = ''; // Bersihkan tabel sebelum diisi ulang
        data.forEach(item => {
            body.innerHTML += `
                <tr>
                    <td>${item.nama}</td>
                    <td>Rp ${parseInt(item.harga).toLocaleString('id-ID')}</td>
                    <td><button>Tambah</button></td>
                </tr>`;
        });
    }

    // Fungsi Pencarian
    function filterBarang() {
        const keyword = document.getElementById('searchBar').value.toLowerCase();
        const filtered = dataBarang.filter(item => 
            item.nama.toLowerCase().includes(keyword)
        );
        renderTable(filtered);
    }

    window.onload = init;
</script>

</body>
</html>
