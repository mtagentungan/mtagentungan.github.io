<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Anggota</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2 id="judulKsg">Detail Kesanggupan</h2>
  
  <div id="listAnggota"></div>

  <div class="card">
    <h3>TAMBAH ANGGOTA</h3>
    <label>Nama:</label>
    <input type="text" id="nama_anggota" autocomplete="off">
    <label>No. WA:</label>
    <input type="text" id="wa_anggota" placeholder="628..." autocomplete="off">
    <label>Kesanggupan:</label>
    <input type="number" id="ksg_anggota" placeholder="500000" autocomplete="off">
    <label>Username:</label>
    <input type="text" id="user_anggota" autocomplete="off">
    <label>PIN:</label>
    <input type="text" id="pin_anggota" maxlength="6" autocomplete="off">
    <button onclick="tambahAnggota()">TAMBAH ANGGOTA</button>
  </div>

  <button class="btn-secondary" onclick="location.href='admin.html'">KEMBALI</button>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz9qxsXcG6l_H10knBDfDsen-wSpfP3z-Cr5uMBJnKlaG_1J441xRutpiBK4iZkwe76/exec'; // GANTI INI
const user = JSON.parse(localStorage.getItem('user'));
const idKsg = localStorage.getItem('id_ksg_aktif');
if(!user || user.role != 'admin' ||!idKsg) location.href = 'index.html';

window.onload = loadDetail;

function loadDetail() {
  document.getElementById('listAnggota').innerHTML = '<div class="card">Loading...</div>';
  
  fetch(GAS_URL + '?action=getDetailKesanggupan', {
    method: 'POST',
    body: JSON.stringify({id_ksg: idKsg})
  })
  .then(r => r.json())
  .then(data => {
    let html = '';
    if(data.length == 0) {
      html = '<div class="card"><p style="text-align:center">Belum ada anggota</p></div>';
    } else {
      data.forEach(a => {
        // a = [ID_KSG, NAMA, NO_WA, KESANGGUPAN_PRIBADI, USERNAME, PIN, ROLE]
        html += `
        <div class="card">
          <h3>${a[1]}</h3>
          <p>
            No. WA: ${a[2]}<br>
            Kesanggupan: <b>Rp ${Number(a[3]).toLocaleString('id')}</b><br>
            Username: ${a[4]}<br>
            PIN: ${a[5]}
          </p>
          <button class="btn-secondary" onclick="hapusAnggota('${a[4]}', '${a[1]}')">HAPUS ANGGOTA</button>
        </div>`;
      });
    }
    document.getElementById('listAnggota').innerHTML = html;
  });
}

function tambahAnggota() {
  const data = {
    id_ksg: idKsg,
    nama: nama_anggota.value.trim(),
    no_wa: wa_anggota.value.trim(),
    kesanggupan: Number(ksg_anggota.value),
    username: user_anggota.value.trim(),
    pin: pin_anggota.value.trim()
  };
  
  if(!data.nama ||!data.no_wa ||!data.kesanggupan ||!data.username ||!data.pin) {
    return alert('Semua field wajib diisi');
  }
  
  fetch(GAS_URL + '?action=tambahAnggota', {
    method: 'POST',
    body: JSON.stringify(data)
  })
  .then(r => r.json())
  .then(res => {
    if(res.status == 'ok') {
      alert('Anggota berhasil ditambah');
      location.reload();
    }
  });
}

function hapusAnggota(username, nama) {
  if(confirm(`Hapus anggota "${nama}"?`)) {
    fetch(GAS_URL + '?action=hapusAnggota', {
      method: 'POST',
      body: JSON.stringify({username: username})
    })
    .then(r => r.json())
    .then(res => {
      if(res.status == 'ok') {
        alert('Anggota berhasil dihapus');
        location.reload();
      }
    });
  }
}
</script>

</body>
</html>
