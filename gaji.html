<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hitung Gaji MTA</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 400px; margin: auto; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; }
    button { background: #1976d2; color: white; border: none; border-radius: 8px; }
    #hasil { background: #e3f2fd; padding: 15px; margin-top: 15px; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>Hitung Gaji Mingguan</h2>
  
  <label>Nama Karyawan:</label>
  <input type="text" id="nama" placeholder="WAWAN">
  
  <label>Tanggal Senin:</label>
  <input type="date" id="tglSenin">
  
  <label>Tanggal Sabtu:</label>
  <input type="date" id="tglSabtu">
  
  <button onclick="hitungGaji()">Hitung Gaji</button>
  
  <div id="hasil" style="display:none;">
    <h3>Hasil:</h3>
    <p>Total Masuk: <b id="totalMasuk">0</b> hari</p>
    <p>Total Gaji: <b>Rp <span id="totalGaji">0</span></b></p>
    <button onclick="kirimWA()">Kirim ke WA</button>
  </div>

  <script>
  const URL_GAS = "https://script.google.com/macros/s/AKfycbwN8eMJaXi2kVg_L3vx_nm2DZy62CGp-n9MhUrzAkoHYVATaQiZzBZgZylua97zla9L/exec";
  let dataGaji = {};

  function hitungGaji() {
    const nama = document.getElementById('nama').value.trim();
    const tglSenin = document.getElementById('tglSenin').value; // format: yyyy-mm-dd
    const tglSabtu = document.getElementById('tglSabtu').value;
    
    // Debug: cek nilainya kebaca ngga
    console.log(nama, tglSenin, tglSabtu); 
    
    if(!nama || !tglSenin || !tglSabtu){
      alert('Lengkapi semua data. Cek tanggal udah kepilih bener belum.');
      return;
    }
    
    // Kasih loading biar ngga dikira nge-hang
    document.querySelector('button').innerText = 'Menghitung...';
    
    const url = `${URL_GAS}?action=hitungGaji&nama=${nama}&tglSenin=${tglSenin}&tglSabtu=${tglSabtu}`;
    
    fetch(url)
      .then(res => res.text())
      .then(jumlahMasuk => {
        const gaji = parseFloat(jumlahMasuk) * 50000; // Ganti 50000
        dataGaji = {nama, jumlahMasuk, gaji};
        
        document.getElementById('totalMasuk').innerText = jumlahMasuk;
        document.getElementById('totalGaji').innerText = gaji.toLocaleString('id-ID');
        document.getElementById('hasil').style.display = 'block';
        document.querySelector('button').innerText = 'Hitung Gaji';
      })
      .catch(err => {
        alert('Gagal ambil data: ' + err);
        document.querySelector('button').innerText = 'Hitung Gaji';
      });
  }
  
  function kirimWA() {
    const text = `Halo, ini rincian gaji saya:%0A%0ANama: ${dataGaji.nama}%0ATotal Masuk: ${dataGaji.jumlahMasuk} hari%0ATotal Gaji: Rp ${dataGaji.gaji.toLocaleString('id-ID')}%0A%0ATerima kasih.`;
    window.open(`https://wa.me/6285728389595?text=${text}`, '_blank');
  }
</script>
</body>
</html>
