<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Penggalangan Dana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Roboto', sans-serif; }</style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <!-- KONFIGURASI URL (ATUR SEKALI DISINI) -->
    <script>
        // GANTI URL DI BAWAH INI DENGAN URL WEB APP GAS ANDA
        localStorage.setItem("APP_URL", "https://script.google.com/macros/s/AKfycbwizaiyL4RBou7xIfM9jnpFpOOHwGU8GvrCXmFj2a15okODvdvu-PbuH9szdaUNff22/exec");
    </script>

    <!-- CARD KESANGGUPAN -->
    <div class="w-full max-w-sm text-center mb-6">
        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">Program Penggalangan Dana</h3>
        <div id="containerKesanggupan" class="space-y-3">
            <div class="bg-white p-4 rounded-xl shadow-md text-gray-400 text-xs animate-pulse">Memuat data program...</div>
        </div>
    </div>

    <!-- CARD LOGIN -->
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm border border-gray-200">
        <h2 class="text-xl font-bold text-gray-800 text-center mb-1">Akses Masuk</h2>
        <p class="text-sm text-gray-500 text-center mb-6">Silakan masukan username dan PIN anda</p>

        <div class="space-y-4">
            <input type="text" id="TextboxUsername" placeholder="Username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
            <input type="password" id="TextboxPIN" placeholder="PIN" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
            <button onclick="prosesLogin()" id="BtnLogin" class="w-full bg-emerald-600 text-white font-bold py-2.5 rounded-lg hover:bg-emerald-700 transition">LOGIN</button>
        </div>
        <div id="notifier" class="hidden mt-4 p-3 rounded-lg text-sm text-center"></div>
    </div>

    <script>
        const WEB_APP_URL = localStorage.getItem("APP_URL");
        const Rupiah = (a) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(a);

        window.onload = muatDataKesanggupan;

        async function muatDataKesanggupan() {
            const container = document.getElementById("containerKesanggupan");
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                container.innerHTML = data.map(item => `
                    <div class="bg-white p-4 rounded-xl shadow-md border border-gray-200">
                        <h4 class="font-bold text-gray-800">${item.nama_kesanggupan}</h4>
                        <div class="text-xs text-gray-500 mt-1">Target: ${Rupiah(item.target_kelompok)} | Terkumpul: ${Rupiah(item.total_terkumpul)}</div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<div class="p-4 text-red-500 text-xs">Gagal terhubung ke database.</div>`;
            }
        }

        async function prosesLogin() {
            const username = document.getElementById("TextboxUsername").value.trim();
            const pin = document.getElementById("TextboxPIN").value.trim();
            const btn = document.getElementById("BtnLogin");
            
            btn.disabled = true; btn.innerText = "MEMPROSES...";
            
            try {
                const res = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", username, pin })
                });
                const result = await res.json();

                if (result.status === "success") {
                    sessionStorage.setItem("user_aktif", JSON.stringify(result.user));
                    window.location.href = result.user.role.toLowerCase() === "admin" ? "admin.html" : "anggota.html";
                } else {
                    alert(result.message);
                    btn.disabled = false; btn.innerText = "LOGIN";
                }
            } catch (e) {
                alert("Gagal terhubung ke database.");
                btn.disabled = false; btn.innerText = "LOGIN";
            }
        }
    </script>
</body>
</html>
