<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Fi Web App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header>
        <h1>Core System</h1>
    </header>

    <div class="card">
        <label>Input Data Barang</label>
        <input type="text" placeholder="Nama Barang..." id="nama">
        
        <label>Jumlah Stok</label>
        <input type="number" placeholder="0" id="stok">
        
        <button class="btn" onclick="simpanData()">Update Database</button>
    </div>

    <div class="card">
        <label>Status Sistem</label>
        <p class="status" id="display-status">Menunggu koneksi...</p>
        <button class="btn btn-secondary">Cek Riwayat</button>
    </div>
</div>

<script>
    function simpanData() {
        document.getElementById('display-status').innerHTML = "Mengirim data ke Google Sheets...";
        // Di sini nanti Anda hubungkan dengan fungsi fetch() ke Google Apps Script
    }
</script>

</body>
</html>
