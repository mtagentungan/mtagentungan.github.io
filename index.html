<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Kesanggupan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Login Kesanggupan</h2>
  
  <div class="card">
    <label>Silakan masukan username dan PIN anda</label>
    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="pin" placeholder="PIN" maxlength="6" autocomplete="off">
    <button onclick="prosesLogin()">LOGIN</button>
  </div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzpjOzg0OLdGBNVf5SYm3iuDJyaE035NLv_XgoM5XZ90dvOhbt6RPZzPAa8324sNQCx/exec'; // WAJIB GANTI

function prosesLogin() {
  const username = document.getElementById('username').value.trim();
  const pin = document.getElementById('pin').value.trim();
  
  if(!username ||!pin) return alert('Username & PIN wajib diisi');

  document.querySelector('button').innerText = 'Loading...';
  
  fetch(GAS_URL + '?action=login', {
    method: 'POST',
    body: JSON.stringify({username, pin})
  })
  .then(res => res.json())
  .then(d => {
    if(d.status == 'ok') {
      localStorage.setItem('user', JSON.stringify(d));
      if(d.role == 'admin') {
        location.href = 'admin.html';
      } else {
        location.href = 'pilih-kesanggupan.html';
      }
    } else {
      alert('Username / PIN salah');
      document.querySelector('button').innerText = 'LOGIN';
    }
  })
  .catch(err => {
    alert('Gagal konek ke server');
    document.querySelector('button').innerText = 'LOGIN';
  });
}
</script>

</body>
</html>
