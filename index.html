<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: sans-serif; }
    .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn-primary { background-color: #2c3e50; border: none; }
    .status-badge { border-radius: 20px; padding: 5px 15px; font-weight: bold; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="container py-4">
  <div id="page-login" class="row justify-content-center">
    <div class="col-md-4">
      <div class="card p-4 text-center">
        <h4 class="mb-3">Login</h4>
        <p class="text-muted">Silakan masukkan username dan PIN anda</p>
        <input type="text" id="user" class="form-control mb-2" placeholder="Username">
        <input type="password" id="pin" class="form-control mb-3" placeholder="PIN">
        <button onclick="handleLogin()" class="btn btn-primary w-100">LOGIN</button>
      </div>
    </div>
  </div>

  <div id="page-admin" class="hidden">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3>Panel Admin</h3>
      <button onclick="logout()" class="btn btn-danger btn-sm">LOGOUT</button>
    </div>
    
    <div class="mb-3">
      <button class="btn btn-success" onclick="showModalKsg()">+ TAMBAH KESANGGUPAN</button>
    </div>

    <div id="list-kesanggupan" class="row g-3">
      </div>
  </div>

  <div id="page-anggota" class="hidden">
    <div class="card p-3 mb-3 bg-white">
      <h5 id="sapaan">Assalamu'alaikum...</h5>
      <hr>
      <div class="row text-center">
        <div class="col-4 border-end">
          <small class="text-muted">Target</small>
          <div id="pribadi-target" class="fw-bold"></div>
        </div>
        <div class="col-4 border-end">
          <small class="text-muted">Bayar</small>
          <div id="pribadi-bayar" class="text-success fw-bold"></div>
        </div>
        <div class="col-4">
          <small class="text-muted">Sisa</small>
          <div id="pribadi-sisa" class="text-danger fw-bold"></div>
        </div>
      </div>
    </div>

    <button class="btn btn-primary w-100 mb-2" onclick="showModalNyicil()">💰 NYICIL</button>
    <button class="btn btn-success w-100 mb-4" onclick="kirimWA()">📞 KIRIM WA</button>

    <h6>Rincian Angsuran:</h6>
    <div id="list-nyicil" class="list-group">
      </div>
    <button onclick="logout()" class="btn btn-outline-secondary w-100 mt-4">LOGOUT</button>
  </div>
</div>

<script>
  const API_URL = "<?= ScriptApp.getService().getUrl() ?>";
  let userData = {};

  async function handleLogin() {
    const data = { username: id('user').value, pin: id('pin').value };
    const res = await apiCall('login', data);
    
    if(res.status == 'ok') {
      userData = res;
      id('page-login').classList.add('hidden');
      if(res.role == 'admin') {
        id('page-admin').classList.remove('hidden');
        loadAdminData();
      } else {
        id('page-anggota').classList.remove('hidden');
        loadAnggotaData();
      }
    } else {
      alert("Username atau PIN salah!");
    }
  }

  async function loadAnggotaData() {
    // Implementasi fetch getAnggotaData dari server
    // Lalu update UI elemen sapaan, pribadi-target, list-nyicil, dll.
  }

  function kirimWA() {
    const msg = `Assalaamu'alaikum,
Mas ${userData.nama}, berikut ini rincian anda untuk kesanggupan *${userData.prog}*:
Kesanggupan: Rp ${userData.target}
...`;
    window.open(`https://wa.me/${userData.wa}?text=${encodeURIComponent(msg)}`);
  }

  async function apiCall(action, data) {
    const res = await fetch(`${API_URL}?action=${action}`, {
      method: 'POST',
      body: JSON.stringify(data)
    });
    return res.json();
  }

  function id(el) { return document.getElementById(el); }
  function logout() { location.reload(); }
</script>
</body>
</html>
