<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <header><h1>DZIKRA LOGIN</h1></header>
    <div class="card">
        <label>Silakan masukan username dan PIN anda</label>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pin" placeholder="PIN" inputmode="numeric">
        <button class="btn" onclick="login()">LOGIN SYSTEM</button>
        <p id="msg" style="text-align:center; font-size:0.8rem; margin-top:10px"></p>
    </div>
</div>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3znTOoXWXk20HN5IZ7NtBpcwFpDpa-n6IBHm0rgN25VYoOXOKdj31wUvF3DBbYQyt/exec"; // Ganti ini sekali saja
    localStorage.setItem("SCRIPT_URL", SCRIPT_URL);

    function login() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pin").value;
        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", username: u, pin: p })
        })
        .then(r => r.json()).then(res => {
            if(res.status == "success") {
                sessionStorage.setItem("user", JSON.stringify(res));
                window.location.href = res.role == "admin" ? "admin.html" : "anggota.html";
            } else { document.getElementById("msg").innerText = res.message; }
        });
    }
</script>
</body>
</html>
