<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header>
        <h1>Dzikra System</h1>
    </header>

    <div class="card" id="login-box">
        <label>Silakan masukan username dan PIN anda</label>
        
        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <input type="password" id="pin" placeholder="PIN (Angka)" inputmode="numeric">
        
        <button class="btn" onclick="prosesLogin()" id="btn-login">LOGIN SYSTEM</button>
        <p class="status" id="msg"></p>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz0fURtH8iIC2DiaxwBB9mfouo0V_EXs17kbg26AMzSzJFnvVk_dJ37tu2L73WS7gd9/exec";

    function prosesLogin() {
        const user = document.getElementById("username").value;
        const pin = document.getElementById("pin").value;
        const msg = document.getElementById("msg");
        const btn = document.getElementById("btn-login");

        if(!user || !pin) {
            msg.innerText = "Isi semua field!";
            return;
        }

        btn.disabled = true;
        btn.innerText = "AUTHENTICATING...";
        msg.innerText = "Menghubungkan ke server...";

        fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({ username: user, pin: pin })
        })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                // Simpan data login di session browser
                sessionStorage.setItem("isLoggedIn", "true");
                sessionStorage.setItem("userData", JSON.stringify(res));

                msg.style.color = "#00d2ff";
                msg.innerText = "Login Berhasil! Mengalihkan...";

                // Arahkan berdasarkan role
                setTimeout(() => {
                    if(res.role === "admin") {
                        window.location.href = "admin.html";
                    } else {
                        window.location.href = "anggota.html";
                    }
                }, 1000);
            } else {
                msg.style.color = "#ff4b2b";
                msg.innerText = res.message;
                btn.disabled = false;
                btn.innerText = "LOGIN SYSTEM";
            }
        })
        .catch(err => {
            msg.innerText = "Error koneksi!";
            btn.disabled = false;
            console.error(err);
        });
    }
</script>

</body>
</html>
