<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loader"><div class="spinner"></div><div style="color:var(--accent);margin-top:15px;letter-spacing:2px;font-size:10px">UPDATING...</div></div>

<div class="app-container">
    <header><h1 id="sapa" style="font-size:1rem">Assalamu'alaikum...</h1></header>
    <div class="card" style="text-align:center">
        <label id="prog-name">Memuat...</label>
        <p>Target: <b id="t-p">0</b> | Titip: <b id="t-b" style="color:#00ff88">0</b></p>
        <p style="border-top:1px solid var(--border);padding-top:10px">Sisa: <b id="t-s" style="color:#ff4b2b">0</b></p>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:15px">
        <button class="btn" onclick="toggleN()">+ NYICIL</button>
        <button class="btn btn-secondary" onclick="kirimWA()">KIRIM WA</button>
    </div>
    <div id="form-n" class="card" style="display:none"><input type="number" id="nom" placeholder="Nominal Rp"><button class="btn" onclick="bayar()">KONFIRMASI</button></div>
    <label>RIWAYAT PEMBAYARAN</label>
    <div id="riwayat"></div>
    <button class="btn btn-secondary" onclick="logout()" style="margin-top:20px">LOGOUT</button>
</div>

<script>
    const url = localStorage.getItem("SCRIPT_URL");
    const user = JSON.parse(sessionStorage.getItem("user"));
    if(!user) window.location.href="index.html";
    document.getElementById("sapa").innerText = "Assalamu'alaikum mas " + user.nama;

    function setLoading(s) { document.getElementById("loader").style.display = s ? "flex" : "none"; }
    function toggleN() { let f=document.getElementById("form-n"); f.style.display=f.style.display=='none'?'block':'none'; }

    let gData = {};
    function loadData() {
        setLoading(true);
        fetch(`${url}?action=getDataAnggota&username=${user.username}`).then(r=>r.json()).then(res=>{
            setLoading(false); gData = res;
            document.getElementById("prog-name").innerText = res.program;
            document.getElementById("t-p").innerText = res.target.toLocaleString();
            document.getElementById("t-b").innerText = res.terbayar.toLocaleString();
            let sisa = res.target - res.terbayar;
            document.getElementById("t-s").innerText = sisa <= 0 ? "SELESAI" : sisa.toLocaleString();
            let h = ""; res.riwayat.forEach(r => h += `<div class="card" style="font-size:0.8rem;padding:10px;margin-bottom:5px"><b>${r.tanggal}</b> - Rp ${r.nominal.toLocaleString()}</div>`);
            document.getElementById("riwayat").innerHTML = h;
        }).catch(()=>setLoading(false));
    }

    function bayar() {
        let n = document.getElementById("nom").value; if(!n) return;
        setLoading(true);
        fetch(url, { method:"POST", body: JSON.stringify({ action:"addBayar", username:user.username, program:gData.program, nominal:n }) }).then(()=>location.reload());
    }

    function kirimWA() {
        let sisa = (gData.target - gData.terbayar) <= 0 ? "*SELESAI*" : `Rp. ${gData.target - gData.terbayar}`;
        let rText = ""; gData.riwayat.forEach(r => rText += `${r.tanggal} - Rp. ${r.nominal}\n`);
        let pesan = `Assalaamu'alaikum,\nMas ${user.nama.toUpperCase()}, rincian *${gData.program}*:\n\nKesanggupan: Rp. ${gData.target}\nTitip: Rp. ${gData.terbayar}\nKekurangan: ${sisa}\n\nRincian:\n${rText}\n> _Bendahara II_`;
        window.open(`https://api.whatsapp.com/send?phone=${user.wa}&text=${encodeURIComponent(pesan)}`, "_blank");
    }

    function logout() { sessionStorage.clear(); window.location.href="index.html"; }
    loadData();
</script>
</body>
</html>
