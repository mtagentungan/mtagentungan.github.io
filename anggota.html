<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anggota - Dzikra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header>
        <h1 id="sapaan">Assalamu'alaikum...</h1>
    </header>

    <div class="card" style="text-align: center;">
        <label id="label-program">Program: -</label>
        <p style="font-size: 0.9rem;">Kesanggupan total anda:<br>
           <strong style="font-size: 1.2rem; color: var(--accent);">Rp <span id="total-target">0</span></strong>
        </p>
        <p style="font-size: 0.9rem;">Sudah membayar:<br>
           <strong style="color: #00ff88;">Rp <span id="total-bayar">0</span></strong>
        </p>
        <p style="font-size: 0.9rem; border-top: 1px solid var(--border); padding-top: 10px;">Kekurangan:<br>
           <strong style="color: #ff4b2b;">Rp <span id="sisa-bayar">0</span></strong>
        </p>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="btn" onclick="toggleNyicil()">+ NYICIL</button>
        <button class="btn btn-secondary" onclick="kirimWA()">KIRIM WA</button>
    </div>

    <div id="form-nyicil" class="card" style="display: none; border: 1px solid var(--accent);">
        <label>Masukkan Nominal Nyicil</label>
        <input type="number" id="input-nominal" placeholder="Contoh: 50000">
        <button class="btn" onclick="prosesBayar()">KONFIRMASI BAYAR</button>
    </div>

    <label style="margin-left: 5px;">RIWAYAT ANGSURAN</label>
    <div id="list-riwayat">
        </div>

    <button class="btn btn-secondary" onclick="logout()" style="margin-top: 20px;">LOGOUT</button>
</div>

<script>
    const url = localStorage.getItem("SCRIPT_URL");
    const user = JSON.parse(sessionStorage.getItem("user"));

    // Proteksi Halaman
    if (!user || user.role !== 'user') window.location.href = "index.html";

    document.getElementById("sapaan").innerText = `Assalamu'alaikum mas ${user.nama},`;

    let globalData = {}; // Untuk menyimpan data yang akan dikirim via WA

    function loadDataAnggota() {
        fetch(`${url}?action=getDataAnggota&username=${user.username}`)
        .then(r => r.json())
        .then(res => {
            globalData = res;
            document.getElementById("label-program").innerText = "Program: " + res.program;
            document.getElementById("total-target").innerText = res.target.toLocaleString();
            document.getElementById("total-bayar").innerText = res.terbayar.toLocaleString();
            
            const sisa = res.target - res.terbayar;
            document.getElementById("sisa-bayar").innerText = sisa <= 0 ? "SELESAI" : sisa.toLocaleString();

            let h = "";
            res.riwayat.forEach(r => {
                h += `
                <div class="card" style="margin-bottom: 8px; padding: 10px; font-size: 0.85rem;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>${r.tanggal}</span>
                        <span style="color: var(--accent); font-weight: bold;">Rp ${r.nominal.toLocaleString()}</span>
                    </div>
                </div>`;
            });
            document.getElementById("list-riwayat").innerHTML = h || "<p class='status'>Belum ada pembayaran</p>";
        });
    }

    function toggleNyicil() {
        const f = document.getElementById("form-nyicil");
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }

    function prosesBayar() {
        const nom = document.getElementById("input-nominal").value;
        if (!nom || nom <= 0) return alert("Masukkan nominal!");

        fetch(url, {
            method: "POST",
            body: JSON.stringify({
                action: "addBayar",
                username: user.username,
                program: globalData.program,
                nominal: nom
            })
        }).then(() => location.reload());
    }

    function kirimWA() {
        const sisaText = (globalData.target - globalData.terbayar) <= 0 ? "*SELESAI*" : `Rp. ${globalData.target - globalData.terbayar}`;
        
        let riwayatText = "";
        globalData.riwayat.forEach(r => {
            riwayatText += `${r.tanggal} - Rp. ${r.nominal}\n`;
        });

        const pesan = `Assalaamu'alaikum,
Mas ${user.nama.toUpperCase()}, berikut ini adalah rincian anda untuk kesanggupan *${globalData.program}* :

Kesanggupan: Rp. ${globalData.target}
Total titip: Rp. ${globalData.terbayar}
Kekurangan: ${sisaText}

Berikut rincian pembayaran:
-----------------------------
${riwayatText}-----------------------------

> _Bendahara II Kelompok Bancak_`;

        const waUrl = `https://api.whatsapp.com/send?phone=${user.wa}&text=${encodeURIComponent(pesan)}`;
        window.open(waUrl, "_blank");
    }

    function logout() { sessionStorage.clear(); window.location.href = "index.html"; }

    loadDataAnggota();
</script>
</body>
</html>
