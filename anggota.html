<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Anggota</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center min-h-screen p-4 space-y-4">

    <!-- CARD VIEW KELOMPOK (RATA TENGAH) -->
    <div id="containerKelompok" class="w-full max-w-sm text-center">
        <!-- Terisi Otomatis via API -->
    </div>

    <!-- MAIN CARD ANGGOTA -->
    <div class="bg-white rounded-2xl shadow-lg p-6 w-full max-w-sm border border-gray-200">
        <!-- Sapaan Nama -->
        <h2 id="sapaanNama" class="text-lg font-bold text-gray-800 mb-4">Assalamu'alaikum,</h2>
        
        <!-- Status Finansial Mandiri -->
        <div class="space-y-2 border-b border-gray-100 pb-4 mb-4 text-sm">
            <div class="flex justify-between">
                <span class="text-gray-500">Kesanggupan total anda:</span>
                <span id="txtKesanggupanPribadi" class="font-bold text-gray-800">Rp. 0</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-500">Sudah membayar:</span>
                <span id="txtSudahBayar" class="font-bold text-emerald-600">Rp. 0</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-500">Kekurangan:</span>
                <span id="txtSisaKekurangan" class="font-bold text-red-500">Rp. 0</span>
            </div>
        </div>

        <!-- RINCIAN ANGSURAN (CICILAN) -->
        <div class="mt-4">
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Rincian Angsuran</h3>
            <div id="listRiwayatCicilan" class="space-y-2 max-h-60 overflow-y-auto pr-1">
                <div class="text-xs text-gray-400 italic text-center py-2 animate-pulse">Memuat riwayat pembayaran...</div>
            </div>
        </div>

        <!-- TOMBOL LOGOUT -->
        <button onclick="prosesLogout()" class="w-full mt-6 bg-gray-100 hover:bg-red-50 hover:text-red-600 text-gray-600 font-bold py-2 rounded-xl text-sm transition text-center border border-gray-200">
            🚪 LOGOUT
        </button>
    </div>

    <script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
       // Ambil URL dari penyimpanan browser yang sudah diset di index
const WEB_APP_URL = localStorage.getItem("APP_URL");

// Tambahkan pengaman jika URL belum diset
if (!WEB_APP_URL) {
    alert("Konfigurasi aplikasi hilang. Silakan login ulang dari halaman awal.");
    window.location.href = "index.html";
}
        let userAktif = null;

        window.onload = function() {
            // Proteksi Halaman
            const sessionData = sessionStorage.getItem("user_aktif");
            if (!sessionData) {
                window.location.href = "index.html";
                return;
            }
            userAktif = JSON.parse(sessionData);
            
            // Set Sapaan Nama Akun
            document.getElementById("sapaanNama").innerText = `Assalamu'alaikum mas ${userAktif.nama},`;
            
            // Muat Data Finansial Kelompok & Pribadi
            muatDataKelompok();
            muatDataFinansialAnggota();
        };

        const Rupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(angka);

        // 1. Memuat Card View Kelompok atas
        async function muatDataKelompok() {
            const container = document.getElementById("containerKelompok");
            try {
                const response = await fetch(`${WEB_APP_URL}?action=get_kelompok`);
                const data = await response.json();
                if(data.length > 0) {
                    const item = data[0]; 
                    const warnaStatus = item.status.toLowerCase() === 'aktif' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800';
                    container.innerHTML = `
                        <div class="bg-white p-4 rounded-xl shadow-md border border-gray-200 flex flex-col items-center justify-center">
                            <span class="px-2.5 py-0.5 text-xs font-bold rounded-full ${warnaStatus} mb-1 uppercase">${item.status}</span>
                            <h4 class="text-md font-bold text-gray-800">${item.nama_kesanggupan}</h4>
                            <p class="text-xs text-gray-500">Target Kelompok: <span class="font-semibold text-emerald-600">${Rupiah(item.target_kelompok)}</span> | Terkumpul: <span class="font-semibold text-blue-600">${Rupiah(item.total_terkumpul)}</span></p>
                        </div>
                    `;
                }
            } catch (e) { console.error("Gagal muat data kelompok", e); }
        }

        // 2. Memuat data personal cicilan anggota
        async function muatDataFinansialAnggota() {
    try {
        const response = await fetch(`${WEB_APP_URL}?action=get_cicilan_anggota&id_anggota=${userAktif.id_anggota}`);
        const resData = await response.json();
        
        const kspPribadi = parseFloat(userAktif.kesanggupan_pribadi) || 0;
        const totalTitip = resData.total_nyicil || 0;
        const sisa = kspPribadi - totalTitip;

        document.getElementById("txtKesanggupanPribadi").innerText = Rupiah(kspPribadi);
        document.getElementById("txtSudahBayar").innerText = Rupiah(totalTitip);
        
        if(sisa <= 0) {
            document.getElementById("txtSisaKekurangan").innerText = "SELESAI";
            document.getElementById("txtSisaKekurangan").className = "font-bold text-green-600";
        } else {
            document.getElementById("txtSisaKekurangan").innerText = Rupiah(sisa);
            document.getElementById("txtSisaKekurangan").className = "font-bold text-red-500";
        }

        // Render Rincian List Angsuran
        const listContainer = document.getElementById("listRiwayatCicilan");
        listContainer.innerHTML = "";

        if(resData.riwayat.length === 0) {
            listContainer.innerHTML = `<p class="text-xs text-gray-400 italic text-center py-4">Belum ada riwayat angsuran.</p>`;
        } else {
            resData.riwayat.forEach(row => {
                // 1. Ambil teks tanggal mentah lalu bersihkan objek waktunya
                const objekTanggal = new Date(row.tanggal);
                
                // 2. Format tanggal menjadi: selasa, 5 Mei 2026
                const opsiTanggal = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                let tglFormat = objekTanggal.toLocaleDateString('id-ID', opsiTanggal);
                
                // Buat huruf pertama hari menjadi kecil sesuai contoh (misal: "Selasa" -> "selasa")
                tglFormat = tglFormat.toUpperCase();

                // 3. Ambil teks jam mentah (contoh: "Sat Dec 30 1899 15:52...")
                const teksJamMentah = row.jam;
                let jamFormat = "00:00";
                
                // Ekstrak bagian jam dan menit (HH:mm) dari teks panjang menggunakan regex
                const pencocokanJam = teksJamMentah.match(/(\d{2}):(\d{2})/);
                if (pencocokanJam) {
                    jamFormat = `${pencocokanJam[1]}:${pencocokanJam[2]}`;
                }

                // 4. Masukkan ke dalam tampilan HTML
                listContainer.innerHTML += `
                    <div class="text-xs bg-gray-50 p-2.5 rounded-lg border border-gray-100 flex justify-between text-gray-600 items-center">
                        <span>📅 ${tglFormat} ${jamFormat}</span>
                        <span class="font-bold text-gray-800">${Rupiah(row.nominal)}</span>
                    </div>
                `;
            });
        }
    } catch(e) { 
        console.error(e); 
        document.getElementById("listRiwayatCicilan").innerHTML = `<p class="text-xs text-red-500 text-center">Gagal memuat riwayat.</p>`;
    }
}

        // Logout
        function prosesLogout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
